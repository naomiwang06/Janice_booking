<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美業預約系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Zen+Kurenaido&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf8f3;
    --warm-white: #f5f2eb;
    --blush: #e8c4b8;
    --rose: #c9907a;
    --mauve: #b07a8a;
    --sage: #8fa48e;
    --ink: #2d2a26;
    --ink-light: #6b6560;
    --ink-muted: #a09890;
    --border: #ddd8cc;
    --accent: #c9907a;
    --paper: #fefcf8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif TC', serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 56px 0 40px;
    position: relative;
  }

  .salon-badge {
    display: inline-block;
    font-family: 'Zen Kurenaido', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--rose);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  header h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 400;
    color: var(--ink);
    letter-spacing: 6px;
    margin-bottom: 8px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--ink-muted);
    letter-spacing: 2px;
  }

  /* hand-drawn divider */
  .divider {
    width: 120px;
    height: 16px;
    margin: 20px auto;
    position: relative;
  }
  .divider svg { width: 100%; height: 100%; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 40px;
  }

  .tab-btn {
    background: none;
    border: 1px solid var(--border);
    padding: 10px 28px;
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .tab-btn:first-child { border-radius: 2px 0 0 2px; }
  .tab-btn:last-child { border-radius: 0 2px 2px 0; }
  .tab-btn.active {
    background: var(--rose);
    border-color: var(--rose);
    color: white;
  }

  /* ── Main Layout ── */
  .main-content { display: none; }
  .main-content.active { display: block; }

  /* ── Booking Form ── */
  .booking-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    align-items: start;
  }

  @media (max-width: 700px) {
    .booking-grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    position: relative;
  }

  /* hand-drawn card corners */
  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--rose);
    border-style: solid;
    opacity: 0.5;
  }
  .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .card::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .card-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--ink);
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 14px;
    background: var(--rose);
    border-radius: 2px;
  }

  /* ── Mini Calendar ── */
  .mini-cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .cal-nav {
    background: none;
    border: 1px solid var(--border);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    color: var(--ink-light);
    font-size: 12px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav:hover { border-color: var(--rose); color: var(--rose); }

  .cal-month-label {
    font-family: 'Shippori Mincho', serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--ink);
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-day-name {
    text-align: center;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--ink-muted);
    padding: 4px 0 8px;
  }

  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    color: var(--ink);
  }
  .cal-day:hover:not(.disabled):not(.empty) { background: var(--warm-white); }
  .cal-day.selected { background: var(--rose); color: white; }
  .cal-day.today { font-weight: 500; color: var(--rose); }
  .cal-day.disabled { color: var(--border); cursor: not-allowed; }
  .cal-day.empty { pointer-events: none; }
  .cal-day.booked::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: var(--mauve);
    border-radius: 50%;
  }
  .cal-day.full { color: var(--ink-muted); }
  .cal-day.full::after { background: var(--blush); }

  /* ── Time Slots ── */
  .time-slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 8px;
  }

  .time-slot {
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 8px 6px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink-light);
    background: var(--paper);
    line-height: 1.4;
  }
  .time-slot:hover:not(.booked) { border-color: var(--rose); color: var(--rose); }
  .time-slot.selected { background: var(--rose); color: white; border-color: var(--rose); }
  .time-slot.booked {
    background: var(--warm-white);
    color: var(--border);
    cursor: not-allowed;
    text-decoration: line-through;
  }

  .selected-date-label {
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* ── Form Fields ── */
  .field-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-muted);
    margin-bottom: 8px;
  }

  input, select, textarea {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--border);
    background: transparent;
    padding: 8px 0;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }
  input:focus, select:focus, textarea:focus { border-bottom-color: var(--rose); }
  textarea { resize: none; height: 64px; }
  select { cursor: pointer; -webkit-appearance: none; }

  .service-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .service-pill {
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink-light);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .service-pill:hover { border-color: var(--rose); color: var(--rose); }
  .service-pill.selected { background: var(--blush); border-color: var(--rose); color: var(--ink); }
  .pill-duration {
    font-size: 10px;
    color: var(--ink-muted);
    background: var(--warm-white);
    border-radius: 10px;
    padding: 1px 6px;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .service-pill.selected .pill-duration { background: rgba(201,144,122,0.2); color: var(--rose); }
  .service-pill:hover .pill-duration { color: var(--rose); }

  /* ── Submit Button ── */
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .btn-submit:hover { background: var(--rose); }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 16px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--ink-muted);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: white;
    padding: 12px 28px;
    border-radius: 2px;
    font-size: 13px;
    letter-spacing: 2px;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Calendar View ── */
  .cal-view-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .cal-view-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    letter-spacing: 4px;
  }

  .cal-view-nav {
    display: flex;
    gap: 8px;
  }

  .full-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }

  .full-cal-day-name {
    text-align: center;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-muted);
    padding: 8px 0 16px;
  }

  .full-cal-cell {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    min-height: 90px;
    padding: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
    position: relative;
  }
  .full-cal-cell:hover { border-color: var(--rose); }
  .full-cal-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .full-cal-cell.today-cell { border-color: var(--rose); }

  .cell-date {
    font-size: 12px;
    color: var(--ink-muted);
    margin-bottom: 6px;
    font-family: 'Shippori Mincho', serif;
  }
  .today-cell .cell-date { color: var(--rose); font-weight: 500; }

  .appt-chip {
    background: var(--blush);
    color: var(--ink);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    margin-bottom: 3px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: background 0.15s;
  }
  .appt-chip:hover { background: var(--rose); color: white; }

  /* ── Appointment List ── */
  .appt-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 32px;
  }

  .appt-item {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px 24px;
    transition: border-color 0.15s;
    position: relative;
  }
  .appt-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0; bottom: 0;
    width: 3px;
    background: var(--rose);
    border-radius: 4px 0 0 4px;
  }
  .appt-item:hover { border-color: var(--rose); }

  .appt-time {
    font-family: 'Shippori Mincho', serif;
    font-size: 18px;
    color: var(--rose);
    min-width: 60px;
    letter-spacing: 1px;
  }

  .appt-info { flex: 1; }
  .appt-name { font-size: 15px; letter-spacing: 1px; margin-bottom: 4px; }
  .appt-service { font-size: 12px; color: var(--ink-muted); letter-spacing: 1px; }
  .appt-phone { font-size: 12px; color: var(--ink-muted); }

  .appt-delete {
    background: none;
    border: 1px solid var(--border);
    color: var(--ink-muted);
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .appt-delete:hover { border-color: #c0392b; color: #c0392b; }

  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--ink-muted);
    font-size: 14px;
    letter-spacing: 2px;
  }

  /* Decorative elements */
  .deco-branch {
    position: absolute;
    opacity: 0.07;
    pointer-events: none;
  }

  @media (max-width: 600px) {
    .full-cal-grid { gap: 4px; }
    .full-cal-cell { min-height: 60px; padding: 4px; }
    .time-slots { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- Decorative SVG branch -->
<svg class="deco-branch" style="top:0;right:-40px;width:200px;" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M100 280 Q80 200 90 140 Q100 80 120 40" stroke="#c9907a" stroke-width="2" fill="none"/>
  <path d="M90 180 Q60 160 40 140" stroke="#c9907a" stroke-width="1.5" fill="none"/>
  <path d="M95 150 Q130 130 150 110" stroke="#c9907a" stroke-width="1.5" fill="none"/>
  <circle cx="40" cy="138" r="5" fill="#e8c4b8"/>
  <circle cx="150" cy="108" r="4" fill="#e8c4b8"/>
  <circle cx="120" cy="40" r="6" fill="#e8c4b8"/>
  <circle cx="55" cy="150" r="3" fill="#e8c4b8"/>
  <circle cx="140" cy="120" r="3" fill="#e8c4b8"/>
</svg>

<svg class="deco-branch" style="bottom:40px;left:-30px;width:150px;transform:scaleX(-1);" viewBox="0 0 200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M100 280 Q80 200 90 140 Q100 80 120 40" stroke="#8fa48e" stroke-width="2" fill="none"/>
  <path d="M90 180 Q60 160 40 140" stroke="#8fa48e" stroke-width="1.5" fill="none"/>
  <path d="M95 150 Q130 130 150 110" stroke="#8fa48e" stroke-width="1.5" fill="none"/>
  <circle cx="40" cy="138" r="5" fill="#d4e4d0"/>
  <circle cx="150" cy="108" r="4" fill="#d4e4d0"/>
</svg>

<div class="container">
  <header>
    <div class="salon-badge">Beauty Salon</div>
    <h1>美 肌 沙 龍</h1>
    <div class="header-sub">線上預約 · Online Booking</div>
    <div class="divider">
      <svg viewBox="0 0 120 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 8 Q20 4 40 8 Q60 12 80 8 Q100 4 118 8" stroke="#c9907a" stroke-width="1" fill="none" stroke-dasharray="2 2"/>
        <circle cx="60" cy="8" r="3" fill="#e8c4b8"/>
        <circle cx="20" cy="7" r="1.5" fill="#e8c4b8"/>
        <circle cx="100" cy="7" r="1.5" fill="#e8c4b8"/>
      </svg>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('booking')">預　約</button>
    <button class="tab-btn" onclick="switchTab('calendar')">行　程</button>
  </div>

  <!-- Booking Tab -->
  <div id="tab-booking" class="main-content active">
    <div class="booking-grid">

      <!-- Left: Date & Time Picker -->
      <div class="card">
        <div class="card-title">選擇日期與時段</div>

        <!-- Mini Calendar -->
        <div class="mini-cal-header">
          <button class="cal-nav" onclick="changeMonth(-1)">&#8249;</button>
          <div class="cal-month-label" id="mini-month-label"></div>
          <button class="cal-nav" onclick="changeMonth(1)">&#8250;</button>
        </div>

        <div class="cal-grid">
          <div class="cal-day-name">日</div>
          <div class="cal-day-name">一</div>
          <div class="cal-day-name">二</div>
          <div class="cal-day-name">三</div>
          <div class="cal-day-name">四</div>
          <div class="cal-day-name">五</div>
          <div class="cal-day-name">六</div>
          <div id="mini-cal-days"></div>
        </div>

        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--rose)"></div>已選擇</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--mauve)"></div>部分預約</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>不可選</div>
        </div>

        <!-- Time Slots -->
        <div style="margin-top: 28px;">
          <div class="selected-date-label" id="selected-date-label">請先選擇日期</div>
          <div class="time-slots" id="time-slots"></div>
        </div>
      </div>

      <!-- Right: Customer Info -->
      <div class="card">
        <div class="card-title">填寫預約資料</div>

        <div class="field-group">
          <label>服務項目 <span style="font-size:10px;color:var(--ink-muted);letter-spacing:1px;">（單選）</span></label>
          <div class="service-pills" id="service-pills-container">
            <div class="service-pill" data-key="睫毛嫁接" onclick="selectService(this)">睫毛嫁接<span class="pill-duration">1hr</span></div>
            <div class="service-pill" data-key="美容保養" onclick="selectService(this)">美容保養<span class="pill-duration">1hr</span></div>
            <div class="service-pill" data-key="美白療程" onclick="selectService(this)">美白療程<span class="pill-duration">2hr</span></div>
            <div class="service-pill" data-key="霧眉紋眉" onclick="selectService(this)">霧眉紋眉<span class="pill-duration">1.5hr</span></div>
            <div class="service-pill" data-key="修眉設計" onclick="selectService(this)">修眉設計<span class="pill-duration">0.5hr</span></div>
            <div class="service-pill" data-key="挽臉" onclick="selectService(this)">挽　　臉<span class="pill-duration">0.5hr</span></div>
          </div>
          <div id="service-duration-hint" style="margin-top:10px;font-size:11px;color:var(--rose);letter-spacing:1px;min-height:16px;"></div>
        </div>

        <div class="field-group" style="margin-top:20px;">
          <label>姓　名</label>
          <input type="text" id="customer-name" placeholder="請輸入姓名" autocomplete="off">
        </div>

        <div class="field-group">
          <label>聯絡電話</label>
          <input type="tel" id="customer-phone" placeholder="0912-345-678" autocomplete="off">
        </div>

        <div class="field-group">
          <label>LINE ID（選填）</label>
          <input type="text" id="customer-line" placeholder="@yourlineid" autocomplete="off">
        </div>

        <div class="field-group">
          <label>備　注</label>
          <textarea id="customer-note" placeholder="特殊需求、過敏史等…"></textarea>
        </div>

        <!-- Summary -->
        <div id="booking-summary" style="background:var(--warm-white);border-radius:4px;padding:14px 16px;margin:12px 0;font-size:12px;color:var(--ink-muted);letter-spacing:1px;min-height:48px;display:flex;align-items:center;">
          <span id="summary-text">完成日期與時段選擇後，摘要將顯示於此</span>
        </div>

        <button class="btn-submit" onclick="submitBooking()">確　認　預　約</button>
      </div>
    </div>
  </div>

  <!-- Calendar Tab -->
  <div id="tab-calendar" class="main-content">

    <div class="cal-view-header">
      <div class="cal-view-title" id="cal-view-month"></div>
      <div class="cal-view-nav">
        <button class="cal-nav" onclick="changeViewMonth(-1)">&#8249;</button>
        <button class="cal-nav" onclick="changeViewMonth(1)">&#8250;</button>
      </div>
    </div>

    <div class="full-cal-grid">
      <div class="full-cal-day-name">日</div>
      <div class="full-cal-day-name">一</div>
      <div class="full-cal-day-name">二</div>
      <div class="full-cal-day-name">三</div>
      <div class="full-cal-day-name">四</div>
      <div class="full-cal-day-name">五</div>
      <div class="full-cal-day-name">六</div>
      <div id="full-cal-days"></div>
    </div>

    <!-- Day Appointments List -->
    <div id="day-detail" style="margin-top:40px;display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-family:'Shippori Mincho',serif;font-size:16px;letter-spacing:3px;" id="day-detail-title"></div>
        <button onclick="document.getElementById('day-detail').style.display='none'" style="background:none;border:none;cursor:pointer;color:var(--ink-muted);font-size:18px;">✕</button>
      </div>
      <div class="appt-list" id="day-appt-list"></div>
    </div>

    <!-- All Appointments -->
    <div style="margin-top:40px;">
      <div class="card-title" style="font-family:'Shippori Mincho',serif;font-size:14px;letter-spacing:3px;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:20px;display:flex;align-items:center;gap:8px;">
        <span style="display:inline-block;width:4px;height:14px;background:var(--rose);border-radius:2px;"></span>
        本月所有預約
      </div>
      <div class="appt-list" id="all-appt-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  Google Apps Script API 網址
//  部署完成後把網址貼在這裡
// ══════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby0WZfF_WcQbiYeebKheV66SZ1bW-pc1pS6oP9NarwHZrY9FAcUYuo06TY1LFQugoe4/exec';

// ── Service Catalog ──
const SERVICES = {
  '睫毛嫁接': 60,
  '美容保養': 60,
  '美白療程': 120,
  '霧眉紋眉': 90,
  '修眉設計': 30,
  '挽臉':     30,
};

// ── Time slots (every 30min, 09:00–18:00) ──
const ALL_SLOTS = [];
for (let h = 9; h < 18; h++) {
  ALL_SLOTS.push(`${String(h).padStart(2,'0')}:00`);
  ALL_SLOTS.push(`${String(h).padStart(2,'0')}:30`);
}

const MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

// ── State ──
const today = new Date();
let bookingMonth = today.getMonth();
let bookingYear  = today.getFullYear();
let viewMonth    = today.getMonth();
let viewYear     = today.getFullYear();
let selectedDate    = null;
let selectedTime    = null;
let selectedService = null;

// 從 Google Sheets 載入的預約資料
let appointments = [];
let isLoading = false;

function fmtDate(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function fmtDateDisplay(dateStr) {
  const [y,m,d] = dateStr.split('-');
  return `${y} 年 ${parseInt(m)} 月 ${parseInt(d)} 日`;
}
function timeToMins(t) {
  const [h,m] = t.split(':').map(Number); return h*60+m;
}
function minsToTime(m) {
  return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}

// ── API：從 Google Sheets 讀取所有預約 ──
async function loadAppointments() {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    appointments = [
      { id:1, date:fmtDate(today.getFullYear(),today.getMonth(),today.getDate()), time:'10:00', duration:60,  name:'王小美', phone:'0912-000-001', service:'美容保養', note:'', 結束時間:'11:00' },
      { id:2, date:fmtDate(today.getFullYear(),today.getMonth(),today.getDate()), time:'14:00', duration:60,  name:'陳雅琳', phone:'0912-000-002', service:'睫毛嫁接', note:'敏感膚質', 結束時間:'15:00' },
    ];
    return;
  }
  try {
    const res  = await fetch(`${SCRIPT_URL}?action=getAppointments`, { redirect: 'follow' });
    const data = await res.json();
    appointments = (data.appointments || []).map((a, i) => ({
      id:       i + 1,
      date:     a['日期']    || '',
      time:     a['開始時間'] || '',
      endTime:  a['結束時間'] || '',
      duration: timeToMins(a['結束時間'] || '00:00') - timeToMins(a['開始時間'] || '00:00'),
      name:     a['姓名']    || '',
      phone:    a['電話']    || '',
      service:  a['服務項目'] || '',
      note:     a['備注']    || '',
    }));
  } catch(e) {
    console.error('載入預約失敗', e);
  }
}

// ── API：新增預約到 Google Sheets ──
async function saveAppointment(appt) {
  if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    appointments.push(appt);
    return { success: true };
  }
  // Apps Script 用 GET + query string 傳資料（避免 CORS preflight 問題）
  const params = new URLSearchParams({
    action:        'addAppointment',
    name:          appt.name,
    phone:         appt.phone         || '',
    service:       appt.service,
    date:          appt.date,
    time:          appt.time,
    duration:      appt.duration,
    durationLabel: appt.durationLabel || '',
    note:          appt.note          || '',
  });
  const res  = await fetch(`${SCRIPT_URL}?${params}`, { redirect: 'follow' });
  return await res.json();
}

let nextId = 10;

// ── Conflict Detection ──
// Returns set of start-time strings that are blocked for a given date + required duration
function getBlockedSlots(dateStr, durationMins) {
  const dayAppts = appointments.filter(a => a.date === dateStr);
  const blocked = new Set();

  ALL_SLOTS.forEach(slot => {
    const start = timeToMins(slot);
    const end   = start + durationMins;
    // Can't book past 18:00
    if (end > 18*60) { blocked.add(slot); return; }
    // Check overlap with existing appointments
    for (const a of dayAppts) {
      const aStart = timeToMins(a.time);
      const aEnd   = aStart + a.duration;
      if (start < aEnd && end > aStart) { blocked.add(slot); break; }
    }
  });
  return blocked;
}

// ── Tab Switching ──
function switchTab(tab) {
  document.querySelectorAll('.main-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'calendar') renderFullCalendar();
}

// ── Service Selection (single) ──
function selectService(el) {
  document.querySelectorAll('.service-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  selectedService = el.dataset.key;
  selectedTime = null;

  const dur = SERVICES[selectedService];
  const hint = document.getElementById('service-duration-hint');
  hint.textContent = `⏱ 此服務需約 ${dur >= 60 ? dur/60 + ' 小時' : dur + ' 分鐘'}，系統將自動排除衝突時段`;

  renderTimeSlots();
  updateSummary();
}

// ── Mini Calendar ──
function renderMiniCal() {
  document.getElementById('mini-month-label').textContent = `${bookingYear} · ${MONTHS[bookingMonth]}`;
  const firstDay    = new Date(bookingYear, bookingMonth, 1).getDay();
  const daysInMonth = new Date(bookingYear, bookingMonth+1, 0).getDate();
  const container   = document.getElementById('mini-cal-days');
  container.style.display = 'contents';
  container.innerHTML = '';

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    container.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = fmtDate(bookingYear, bookingMonth, d);
    const date    = new Date(bookingYear, bookingMonth, d);
    const isPast  = date < new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const isToday = date.toDateString() === today.toDateString();
    const appts   = appointments.filter(a => a.date === dateStr);
    const isBooked   = appts.length > 0;
    // Check if fully blocked for selected service
    let isFull = false;
    if (!isPast && selectedService) {
      const dur = SERVICES[selectedService];
      const blocked = getBlockedSlots(dateStr, dur);
      const available = ALL_SLOTS.filter(s => !blocked.has(s));
      isFull = available.length === 0;
    }
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (isPast)                           el.classList.add('disabled');
    else if (dateStr === selectedDate)    el.classList.add('selected');
    else if (isToday)                     el.classList.add('today');
    if (isBooked && dateStr !== selectedDate) el.classList.add('booked');
    if (isFull)                           el.classList.add('full');
    el.textContent = d;
    if (!isPast) el.onclick = () => selectDate(dateStr);
    container.appendChild(el);
  }
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  selectedTime = null;
  renderMiniCal();
  renderTimeSlots();
  updateSummary();
}

function changeMonth(dir) {
  bookingMonth += dir;
  if (bookingMonth > 11) { bookingMonth = 0; bookingYear++; }
  if (bookingMonth < 0)  { bookingMonth = 11; bookingYear--; }
  renderMiniCal();
}

// ── Time Slots ──
function renderTimeSlots() {
  const label     = document.getElementById('selected-date-label');
  const container = document.getElementById('time-slots');

  if (!selectedDate) {
    label.textContent = '請先選擇日期';
    container.innerHTML = '';
    return;
  }
  if (!selectedService) {
    label.textContent = '請先在右側選擇服務項目';
    container.innerHTML = '<div style="font-size:12px;color:var(--ink-muted);letter-spacing:1px;padding:8px 0;">選擇服務後將顯示可預約時段</div>';
    return;
  }

  const dur     = SERVICES[selectedService];
  const blocked = getBlockedSlots(selectedDate, dur);
  label.textContent = fmtDateDisplay(selectedDate) + ' · 可用時段';

  container.innerHTML = ALL_SLOTS.map(t => {
    const isBlocked  = blocked.has(t);
    const isSelected = t === selectedTime;
    const endTime    = minsToTime(timeToMins(t) + dur);
    return `<div class="time-slot ${isBlocked ? 'booked' : ''} ${isSelected ? 'selected' : ''}"
      onclick="${isBlocked ? '' : `selectTime('${t}')`}">
      <div style="font-size:12px;">${t}</div>
      <div style="font-size:9px;opacity:0.7;margin-top:1px;">→ ${endTime}</div>
    </div>`;
  }).join('');
}

function selectTime(time) {
  selectedTime = time;
  renderTimeSlots();
  updateSummary();
}

function updateSummary() {
  const el = document.getElementById('summary-text');
  if (!selectedDate && !selectedTime) {
    el.textContent = '完成選擇後，預約摘要將顯示於此';
    return;
  }
  let parts = [];
  if (selectedService) {
    const dur = SERVICES[selectedService];
    parts.push(`✨ ${selectedService}（${dur>=60 ? dur/60+'hr' : dur+'min'}）`);
  }
  if (selectedDate) parts.push(`📅 ${fmtDateDisplay(selectedDate)}`);
  if (selectedTime && selectedService) {
    const end = minsToTime(timeToMins(selectedTime) + SERVICES[selectedService]);
    parts.push(`🕐 ${selectedTime} ～ ${end}`);
  }
  el.textContent = parts.join('　');
}

// ── Submit ──
async function submitBooking() {
  const name  = document.getElementById('customer-name').value.trim();
  const phone = document.getElementById('customer-phone').value.trim();
  const note  = document.getElementById('customer-note').value.trim();
  const line  = document.getElementById('customer-line').value.trim();

  if (!selectedService) return showToast('請選擇服務項目');
  if (!selectedDate)    return showToast('請選擇預約日期');
  if (!selectedTime)    return showToast('請選擇預約時段');
  if (!name)            return showToast('請填寫姓名');
  if (!phone)           return showToast('請填寫聯絡電話');

  const dur = SERVICES[selectedService];
  const durationLabel = dur >= 60 ? dur/60 + 'hr' : dur + 'min';

  const btn = document.querySelector('.btn-submit');
  btn.textContent = '儲存中…';
  btn.disabled = true;

  try {
    const result = await saveAppointment({
      id: nextId++, date: selectedDate, time: selectedTime,
      duration: dur, durationLabel, name, phone, service: selectedService, note, line
    });

    if (result.success === false) {
      showToast(result.error || '預約失敗，請再試一次');
      return;
    }

    await loadAppointments();
    showToast('✓ 預約成功！期待您的光臨');

    selectedDate = null; selectedTime = null; selectedService = null;
    document.getElementById('customer-name').value = '';
    document.getElementById('customer-phone').value = '';
    document.getElementById('customer-note').value = '';
    document.getElementById('customer-line').value = '';
    document.querySelectorAll('.service-pill').forEach(el => el.classList.remove('selected'));
    document.getElementById('service-duration-hint').textContent = '';
    renderMiniCal(); renderTimeSlots(); updateSummary();

  } catch(e) {
    showToast('網路錯誤，請再試一次');
  } finally {
    btn.textContent = '確　認　預　約';
    btn.disabled = false;
  }
}

// ── Full Calendar ──
function renderFullCalendar() {
  document.getElementById('cal-view-month').textContent = `${viewYear} 年 ${MONTHS[viewMonth]}`;
  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const container   = document.getElementById('full-cal-days');
  container.style.display = 'contents';
  container.innerHTML = '';

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div'); el.className = 'full-cal-cell empty'; container.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr  = fmtDate(viewYear, viewMonth, d);
    const isToday  = new Date(viewYear, viewMonth, d).toDateString() === today.toDateString();
    const dayAppts = appointments.filter(a => a.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));
    const el = document.createElement('div');
    el.className = 'full-cal-cell' + (isToday ? ' today-cell' : '');
    el.innerHTML = `<div class="cell-date">${d}</div>`;
    dayAppts.slice(0,3).forEach(appt => {
      const chip = document.createElement('div');
      chip.className = 'appt-chip';
      const endTime = minsToTime(timeToMins(appt.time) + appt.duration);
      chip.textContent = `${appt.time} ${appt.name}`;
      chip.title = `${appt.service} ${appt.time}～${endTime}`;
      chip.onclick = (e) => { e.stopPropagation(); showDayDetail(dateStr); };
      el.appendChild(chip);
    });
    if (dayAppts.length > 3) {
      const more = document.createElement('div');
      more.style.cssText = 'font-size:10px;color:var(--ink-muted);padding:2px 6px;';
      more.textContent = `+${dayAppts.length-3} 筆`;
      el.appendChild(more);
    }
    el.onclick = () => showDayDetail(dateStr);
    container.appendChild(el);
  }
  renderAllAppts();
}

function showDayDetail(dateStr) {
  const dayAppts = appointments.filter(a => a.date === dateStr).sort((a,b) => a.time.localeCompare(b.time));
  const detail   = document.getElementById('day-detail');
  detail.style.display = 'block';
  document.getElementById('day-detail-title').textContent = fmtDateDisplay(dateStr) + ' 預約';
  renderApptList(document.getElementById('day-appt-list'), dayAppts);
  detail.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function renderAllAppts() {
  const prefix = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
  const monthAppts = appointments.filter(a => a.date.startsWith(prefix))
    .sort((a,b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));
  renderApptList(document.getElementById('all-appt-list'), monthAppts);
}

function renderApptList(container, appts) {
  if (!appts.length) { container.innerHTML = '<div class="empty-state">— 尚無預約 —</div>'; return; }
  container.innerHTML = appts.map(a => {
    const endTime = minsToTime(timeToMins(a.time) + a.duration);
    const dur = a.duration >= 60 ? a.duration/60 + 'hr' : a.duration + 'min';
    return `<div class="appt-item">
      <div class="appt-time">${a.time}<div style="font-size:10px;color:var(--ink-muted);margin-top:2px;">→ ${endTime}</div></div>
      <div class="appt-info">
        <div class="appt-name">${a.name}</div>
        <div class="appt-service">${a.service} <span style="color:var(--rose);font-size:10px;">${dur}</span>${a.date ? '　' + fmtDateDisplay(a.date) : ''}</div>
        <div class="appt-phone">${a.phone}${a.note ? '　' + a.note : ''}</div>
      </div>
      <button class="appt-delete" onclick="deleteAppt(${a.id})" title="取消預約">✕</button>
    </div>`;
  }).join('');
}

function deleteAppt(id) {
  if (!confirm('確定要取消此預約？')) return;
  appointments = appointments.filter(a => a.id !== id);
  renderFullCalendar(); renderMiniCal(); showToast('預約已取消');
}

function changeViewMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  document.getElementById('day-detail').style.display = 'none';
  renderFullCalendar();
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Init ──
async function init() {
  await loadAppointments();
  renderMiniCal();
  renderTimeSlots();
}
init();
</script>
</body>
</html>
